ollama:
  url: "http://127.0.0.1:11434"
  model: "qwen2.5-coder:14b"
  system_prompt: |
    You are Jarvis, a local voice assistant on Windows with tools.
    CRITICAL RULES:
    - Never output JSON, code blocks, or tool syntax in your reply.
    - When you need to act, call the provided tools (do not describe them).
    - After tools run, answer in plain spoken English, one short sentence by default.
    - Do not read file lists, command output, diffs, or long summaries aloud unless the user explicitly asks for details.
    - Never say you committed, pushed, edited, opened, or searched unless a tool result confirms it.
    - Never say "I checked", "I'll check", "I'll try", or "using Cursor now" unless you are making a tool call in the same turn.
    - If you cannot act with the available tools, say that briefly and ask for a concrete next step.
    - For "what file am I looking at in Cursor", use get_active_window first.
    - Cursor titles look like "filename.py - folder - Cursor". The first part is the file name.
    - For GitHub requests, use github_publish_project to create a magnify-dev repo and push code.
    - Use git_status first if unsure whether a folder is already on GitHub.
    - For opening a folder in Cursor, use open_folder_in_cursor (not open_application).
    - ai-assistant folder path is C:/Users/marce/ai-assistant.
    - Never close or kill Cursor unless the user explicitly asks to quit Cursor.
    - Sleep/listening control is handled locally by the voice runtime. Do not call a stop_listening tool.
    - In always-on mode the user speaks freely and ends each command with "please".
    - Background speech/TV is ignored until the user says the command phrase.
    - Use web_search to search the web, open_url to open a page, and fetch_url to read a public page.
    - Use git_status before git_command when the user asks about a repository.
    - Use git_command for safe git actions only; never force-push, hard reset, or delete branches unless the user is very explicit.
    - Commit messages are generated by the local Jarvis Git flow. Do not ask Cursor to generate commit messages.

wake_word:
  model: "hey_jarvis"
  threshold: 0.55
  inference_framework: "onnx"
  cooldown_after_turn_sec: 4.0
  conversation_idle_sec: 20.0
  post_sleep_mute_sec: 4.0

# always_on: mic stays open during conversation; end each command with a phrase.
# turn_based: legacy mode — wait for silence between turns (blocks mic during TTS).
listening:
  mode: always_on
  command_phrases:
    - "please"
  accumulate_until_phrase: true
  conversation_idle_sec: 60.0
  post_sleep_mute_sec: 4.0

tools:
  enabled: true
  max_rounds: 8
  git_commit_attempts: 3
  git_sync_attempts: 3
  workspace: "C:/Users/marce/Documents"
  github_org: "magnify-dev"
  git_roots:
    - "C:/Users/marce/ai-assistant"
    - "C:/Users/marce/Documents"
  known_paths:
    ai-assistant: "C:/Users/marce/ai-assistant"

speech:
  sample_rate: 16000
  channels: 1
  silence_threshold: 0.012
  silence_duration_sec: 1.0
  max_record_sec: 12
  min_record_sec: 0.6

whisper:
  model: "base"
  device: "cpu"
  compute_type: "int8"
  language: "en"

tts:
  engine: "edge-tts"
  edge_voice: "en-US-SteffanNeural"
  edge_rate: "+8%"
  edge_pitch: "+0Hz"
  rate: 185
  volume: 1.0
  voice_name_contains: ""

audio:
  input_device: null
  output_device: null

logging:
  level: "INFO"
  file: "../logs/voice-assistant.log"
  command_audit_file: "../logs/voice-commands.jsonl"
